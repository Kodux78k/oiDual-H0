  <script>
    (() => {
      const bodyPlayer = document.getElementById('bodyPlayer');
      const idleSelector = '.kob-tts-dock, #kodux-widget, [data-idle-target]';
      const modes = ['player', 'embed', 'fullscreen', 'compact'];
      let idleTimer = null;

      function getIdleTargets() {
        return document.querySelectorAll(idleSelector);
      }

      function setIdleState(isIdle) {
        getIdleTargets().forEach(el => el.classList.toggle('idle', isIdle));
      }

      function resetIdle() {
        setIdleState(false);

        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          setIdleState(true);
        }, 1870);
      }

      function setMode(mode = 'player') {
        if (!bodyPlayer || !modes.includes(mode)) return;

        bodyPlayer.dataset.mode = mode;
        bodyPlayer.classList.remove(...modes.map(m => `mode-${m}`));
        bodyPlayer.classList.add(`mode-${mode}`);
      }

      window.KoduxShell = {
        setMode,
        resetIdle
      };

      ['pointerdown', 'pointermove', 'touchstart', 'mousemove', 'scroll'].forEach(ev => {
        document.addEventListener(ev, resetIdle, { passive: true });
      });

      document.addEventListener('keydown', resetIdle);

      setMode(bodyPlayer?.dataset.mode || 'player');
      resetIdle();
    })();
  </script>

// 🔹 GERADOR UNIVERSAL
function makeOrbAvatar(name, size = 36) {
  const safe = name || 'DUAL';

  // seed determinística baseada no nome
  const seed = safe.split('').reduce((a, c) => a + c.charCodeAt(0), 0);

  const h1 = seed % 360;
  const h2 = (seed * 37) % 360;

  // 🔒 evita colisão de gradient no DOM
  const uid = Math.random().toString(36).slice(2, 6);
  const id = 'g' + seed.toString(36) + uid;

  return `
    <svg width="${size}" height="${size}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="hsl(${h1},100%,55%)"/>
          <stop offset="100%" stop-color="hsl(${h2},90%,45%)"/>
        </linearGradient>
      </defs>

      <!-- base -->
      <rect width="32" height="32" rx="7" fill="#071018"/>

      <!-- glow -->
      <circle cx="16" cy="16" r="9" fill="url(#${id})" opacity="0.25"/>

      <!-- core -->
      <circle cx="16" cy="16" r="7" fill="url(#${id})"/>

      <!-- ring -->
      <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    </svg>
  `;
}


// 🔓 GLOBAL HOOK
window.makeOrbAvatar = makeOrbAvatar;

// 🔹 ALIAS OPCIONAL (mini semântico)
window.makeMiniAvatar = (name) => makeOrbAvatar(name, 24);

}
