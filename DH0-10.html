<html lang="pt-BR"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dual.Infodose — Smart HUD · Orb Nexus</title>

<!-- iOS Support -->
<link rel="apple-touch-icon" href="./icon-192.png">
<!-- Manifest -->
<link rel="manifest" href="./manifest.json">
 
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/css/kob-root.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/css/kob-hud.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-DH10.css">

<!-- Estilos do ORB integrado (extraídos do kob-orb2D-BASE-NEB.html) -->
<style>
    :root {
        --orb-speed: 7.8s;
        --kob-voice-primary: #78e3ff;
        --kob-voice-secondary: #b978ff;
        --kob-voice-accent: #ffffff;
    }

    /* Container do ORB no botão de arquétipo */
    .orb-microphone-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    /* Mini orb adaptado para caber no botão */
    .tts-orb-mini {
        width: 28px;
        height: 28px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .orb {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        position: relative;
        display: grid;
        place-items: center;
        transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.2, 1);
    }

    .orb-core {
        width: 78%;
        height: 78%;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, var(--kob-voice-accent) 0%, rgba(255,255,255,0.1) 10%, transparent 60%),
                    radial-gradient(circle at 70% 70%, var(--kob-voice-primary) 0%, var(--kob-voice-secondary) 100%);
        box-shadow: 0 0 15px var(--kob-voice-primary);
        animation: orbSpin var(--orb-speed) linear infinite;
    }

    @keyframes orbSpin { 
        to { transform: rotate(360deg); } 
    }

    /* Estado de fala (ativo) */
    .speaking .orb-core {
        animation: orbSpin 2s linear infinite, orbPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes orbPulse { 
        from { transform: scale(1); } 
        to { transform: scale(1.15); } 
    }

    /* Indicador de voz original agora integrado ao orb */
    .voice-indicator {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4caf50;
        box-shadow: 0 0 8px #4caf50;
        transition: all 0.3s ease;
        z-index: 10;
    }

    .voice-indicator.muted {
        background: #f44336;
        box-shadow: 0 0 8px #f44336;
    }

    /* Ajuste no botão para acomodar o orb */
    #btn-arch {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        overflow: visible;
    }

    /* Remove o ícone de microfone padrão se houver */
    #btn-arch::before {
        display: none;
    }
</style>
<style>
        :root {
          --z-base: 0;
          --z-content: 100;
          --z-widget: 500;
          --z-overlay: 1000;
          --z-system: 5000;
        }
      </style></head>
<body>

<div class="wrap">
  <div class="content">
    <iframe id="frame" src="about:blank"></iframe>
  </div>

  <!-- HUD Inteligente -->
  <div class="symbol-bar floating" id="symbolBar">
    <div class="toggle-wrap">
      <button class="symbol-button main-toggle" id="toggleBtn" title="Menu / Iniciar">≡</button>
    </div>

    <!-- Controles de Navegação de Leitura -->
    <div class="symbol-wrap"><button class="symbol-button" id="btn-prev" title="Voltar Bloco">◀</button></div>
    <div class="symbol-wrap"><button class="symbol-button" id="btn-play" title="Play/Pause">▶</button></div>
    <div class="symbol-wrap"><button class="symbol-button" id="btn-next" title="Próximo Bloco">▶▶</button></div>

    <!-- Troca de Arquétipo com ORB integrado -->
    <div class="symbol-wrap">
      <button class="symbol-button" id="btn-arch" title="Trocar Arquétipo de Voz">
        <div class="orb-microphone-container">
          <div class="tts-orb-mini">
            <div class="orb" id="main-orb">
              <div class="orb-core"></div>
            </div>
          </div>
          <div class="voice-indicator" id="voiceIndicator"></div>
        </div>
      </button>
    </div>

    <div class="symbol-wrap"><button class="symbol-button" data-id="phi" data-url="about:blank">Φ</button></div>
    <div class="symbol-wrap"><button class="symbol-button" data-id="viv" data-url="https://kodux78k.github.io/oiDual-Vivivi-1/">꩜</button></div>
    <div class="symbol-wrap"><button class="symbol-button" data-id="home" data-url="https://kodux78k.github.io/oiDual-idHome/">◌</button></div>
    <div class="symbol-wrap"><button class="symbol-button" data-id="uno" data-url="https://kodux78k.github.io/Unouno-/index.html">☼</button></div>
    <div class="symbol-wrap"><button class="symbol-button" data-id="tst" data-url="https://kodux78k.github.io/oiDual-tst1/">◑</button></div>
    <div class="symbol-wrap"><button class="symbol-button" data-id="doc" data-url="https://kodux78k.github.io/info-Doc/index.html">◘</button></div>
    <div class="hud-info" id="hudStatus">KOBLLUX · ORB NEXUS</div>
  </div>

  <div id="kob-tts-outline"></div>
</div>

<!-- Scripts -->
<script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/m0ds/kob-hud.js/"></script>
<script type="module" src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/kobdh0-main.js"></script>
<script src="https://kodux78k.github.io/oiDual--Y-/js/kob-home.js"></script>

<!-- Script para controle do ORB e indicador de voz -->
<script>
  (function() {
    // Inicialização quando o DOM estiver pronto
    document.addEventListener('DOMContentLoaded', function() {
      const archButton = document.getElementById('btn-arch');
      const orbElement = document.querySelector('#btn-arch .orb');
      const voiceIndicator = document.getElementById('voiceIndicator');
      
      // Estado da voz (simulado - integra com o sistema TTS existente)
      let isVoiceActive = true; // Começa ativo
      
      // Função para atualizar o estado visual do ORB e indicador
      function updateVoiceState(active) {
        if (active) {
          archButton?.classList.add('speaking');
          voiceIndicator?.classList.remove('muted');
          voiceIndicator?.style.setProperty('background', '#4caf50');
          voiceIndicator?.style.setProperty('box-shadow', '0 0 8px #4caf50');
        } else {
          archButton?.classList.remove('speaking');
          voiceIndicator?.classList.add('muted');
          voiceIndicator?.style.setProperty('background', '#f44336');
          voiceIndicator?.style.setProperty('box-shadow', '0 0 8px #f44336');
        }
      }
      
      // Estado inicial
      updateVoiceState(isVoiceActive);
      
      // Toggle de voz ao clicar no botão (mantém função original)
      archButton?.addEventListener('click', function(e) {
        e.preventDefault();
        isVoiceActive = !isVoiceActive;
        updateVoiceState(isVoiceActive);
        
        // Disparar evento personalizado para o sistema TTS existente
        const ttsEvent = new CustomEvent('kob-voice-toggle', { 
          detail: { active: isVoiceActive } 
        });
        document.dispatchEvent(ttsEvent);
        
        // Log visual (opcional)
        console.log(`🎙 Voice ${isVoiceActive ? 'ACTIVATED' : 'MUTED'}`);
      });
      
      // Integração com o sistema de arquétipos (se houver)
      // Escuta mudanças de arquétipo para atualizar cores do orb
      document.addEventListener('kob-arch-change', function(e) {
        const archColor = e.detail?.color || '#78e3ff';
        const secondaryColor = e.detail?.secondary || '#b978ff';
        
        document.documentElement.style.setProperty('--kob-voice-primary', archColor);
        document.documentElement.style.setProperty('--kob-voice-secondary', secondaryColor);
      });
      
      // Simulação de fala (para teste)
      // Em produção, isso seria ativado pelo TTS real
      window.simulateSpeech = function(isSpeaking) {
        if (isSpeaking) {
          archButton?.classList.add('speaking');
        } else {
          archButton?.classList.remove('speaking');
        }
      };
    });
  })();
</script>


</body></html>
